<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAKportal - Smart AI Writer</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --accent: #6366f1;
            --border: #27272a;
            --text-p: #a1a1aa;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .writer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .header-title { display: flex; align-items: center; gap: 10px; }
        .header h2 { font-size: 18px; margin: 0; font-weight: 600; }
        .badge { background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        textarea {
            width: 100%;
            background: #1a1a1c;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
            margin-bottom: 20px;
            min-height: 120px;
        }
        textarea:focus { outline: none; border-color: var(--accent); background: #1e1e20; }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: #4f46e5; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .action-btn:disabled { background: #27272a; color: #71717a; cursor: not-allowed; transform: none; }

        .output-section {
            margin-top: 24px;
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 24px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            font-size: 14px;
            line-height: 1.6;
            color: #e4e4e7;
            white-space: pre-wrap;
            margin-bottom: 12px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-p);
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            float: right;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #27272a; color: #fff; border-color: var(--text-p); }
    </style>
</head>
<body>

<div class="writer-card">
    <div class="header">
        <div class="header-title">
            <span style="font-size: 20px;">🖋️</span>
            <h2>Smart AI Writer</h2>
        </div>
        <span class="badge">Gemini Flash</span>
    </div>
    
    <textarea id="prompt" placeholder="Roughly likhen kya draft karna hai... (Example: Write a polite email to Arbab to update the transport route list by tomorrow morning)"></textarea>

    <button id="btn" class="action-btn" onclick="generateDraft()">Generate Professional Text</button>

    <div id="outputContainer" class="output-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span style="font-size: 11px; color: var(--text-p); text-transform: uppercase;">AI Generated Draft</span>
        </div>
        <div id="result" class="result-box"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy Text</button>
        <div style="clear: both;"></div>
    </div>
</div>

<script>
    // Aapki Nayi API Key
    const API_KEY = "AIzaSyCpjBt5h3IQFM6SHlO5DY47HuMkDOrvRmk"; 

    async function generateDraft() {
        const promptArea = document.getElementById('prompt');
        const promptText = promptArea.value.trim();
        const btn = document.getElementById('btn');
        const output = document.getElementById('outputContainer');
        const resultBox = document.getElementById('result');

        if (!promptText) {
            alert("Kuch toh type karein!");
            return;
        }

        // UI States
        btn.disabled = true;
        btn.innerText = "Writing... Please wait";
        output.style.display = "none";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `System: You are a professional corporate assistant at IPAK. Rewrite the user's rough notes into a formal, polite, and professional corporate email or notice. Do not include subject lines or conversational filler, just give the body text.\n\nUser Notes: ${promptText}` 
                        }]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const finalResult = data.candidates[0].content.parts[0].text;
                resultBox.innerText = finalResult.trim();
                output.style.display = "block";
            } else {
                throw new Error("Could not generate text. Try a different prompt.");
            }

        } catch (error) {
            console.error("AI Error:", error);
            alert("AI Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Professional Text";
        }
    }

    function copyText() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => { copyBtn.innerText = "Copy Text"; }, 2000);
        });
    }
</script>

</body>
</html>
