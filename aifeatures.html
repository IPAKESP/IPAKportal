<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Portal - Smart Writer</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy:         #203265;
            --lime:         #A8C500;
            --white:        #FFFFFF;
            --med-grey:     #9C9C9C;
            --light-grey:   #D4D4D4;
            --bg-color:     #F5F7FA;
            --border-light: #E5E7EB;
            --navy-light:   #2d4285;
            --success:      #16a34a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }

        body {
            background: var(--bg-color);
            color: var(--navy);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── CUSTOM CURSOR ── */
        .cursor-dot {
            width: 8px; height: 8px; background: var(--lime);
            position: fixed; pointer-events: none; z-index: 10000;
            border-radius: 50%; box-shadow: 0 0 10px var(--lime);
            transform: translate(-50%, -50%);
        }
        .cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--navy);
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; transition: width 0.2s, height 0.2s, background 0.2s;
            transform: translate(-50%, -50%);
        }
        body.hovering .cursor-outline {
            width: 60px; height: 60px;
            border-color: var(--lime);
            background: rgba(168, 197, 0, 0.1);
        }

        /* ── TOP BAR ── */
        .top-bar {
            background: rgba(255,255,255,0.98);
            border-bottom: 1px solid var(--border-light);
            height: 64px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            box-shadow: 0 1px 8px rgba(32,50,101,0.06);
        }
        .logo-link img { width: 100px; height: auto; transition: opacity 0.3s; }
        .logo-link:hover img { opacity: 0.8; }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .user-icon { font-size: 22px; color: var(--navy); transition: color 0.3s; cursor: pointer; }
        .user-icon:hover { color: var(--lime); }
        .logout-btn {
            padding: 6px 16px; background: transparent;
            border: 1px solid var(--border-light); color: var(--navy);
            border-radius: 6px; font-weight: 500; font-size: 13px;
            transition: all 0.3s; cursor: pointer;
        }
        .logout-btn:hover { border-color: var(--navy); background: #f3f4f6; }

        /* ── LAYOUT ── */
        .wrapper {
            padding-top: 100px;
            padding-bottom: 60px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .container { width: 100%; max-width: 620px; padding: 0 24px; }

        /* ── PAGE HEADER ── */
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .page-header { text-align: center; margin-bottom: 32px; animation: float 6s ease-in-out infinite; }
        .page-header h1 { font-size: 2rem; color: var(--navy); font-weight: 700; }
        .page-header p { color: var(--lime); letter-spacing: 2px; text-transform: uppercase; font-size: 0.78rem; font-weight: 700; margin-top: 4px; }

        /* ── CARD ── */
        .card {
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(32,50,101,0.07);
        }

        .card-header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 22px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-light);
        }
        .card-icon {
            width: 34px; height: 34px;
            background: var(--navy);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .card-icon i { color: var(--lime); font-size: 0.85rem; }
        .card-title { font-size: 0.9rem; font-weight: 700; color: var(--navy); }
        .card-badge {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            font-size: 0.72rem; color: var(--med-grey); font-weight: 500;
        }
        .status-dot {
            width: 7px; height: 7px; background: var(--lime);
            border-radius: 50%; box-shadow: 0 0 6px var(--lime);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

        .card-body { padding: 22px; }

        /* ── TEXTAREA ── */
        textarea {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--navy);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            line-height: 1.65;
            resize: vertical;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            margin-bottom: 16px;
        }
        textarea:focus {
            border-color: var(--lime);
            box-shadow: 0 0 0 3px rgba(168,197,0,0.12);
            background: var(--white);
        }
        textarea::placeholder { color: #b0b8cc; }

        /* ── LOADING BAR ── */
        .loading-track {
            height: 3px; background: var(--border-light);
            border-radius: 2px; overflow: hidden;
            margin-bottom: 14px; display: none;
        }
        .loading-track.active { display: block; }
        .loading-fill {
            height: 100%; width: 40%;
            background: linear-gradient(90deg, var(--navy), var(--lime), var(--navy));
            background-size: 200% auto;
            animation: slide-load 1.4s linear infinite;
        }
        @keyframes slide-load { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

        /* ── BUTTONS ── */
        .btn-primary {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 13px;
            background: var(--navy);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 2px 10px rgba(32,50,101,0.2);
        }
        .btn-primary i { color: var(--lime); }
        .btn-primary:hover:not(:disabled) {
            background: var(--navy-light);
            box-shadow: 0 6px 20px rgba(32,50,101,0.3);
            transform: translateY(-1px);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 11px;
            background: transparent;
            color: var(--navy);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-secondary:hover { border-color: var(--navy); background: #f3f4f6; }
        .btn-secondary.copied { border-color: var(--success); color: var(--success); background: #f0fdf4; }

        /* ── OUTPUT ── */
        .output-container {
            display: none;
            border-top: 1px solid var(--border-light);
            padding: 20px 22px 22px;
            animation: fadeIn 0.35s ease;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        .output-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--med-grey);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .output-label::after { content:''; flex:1; height:1px; background:var(--border-light); }

        .result-box {
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-left: 3px solid var(--lime);
            border-radius: 10px;
            padding: 16px;
            font-size: 0.88rem;
            line-height: 1.75;
            color: var(--navy);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-box.typing::after {
            content: '|';
            animation: blink 0.7s step-end infinite;
            color: var(--lime); font-weight: 700;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            margin-top: 28px;
            color: var(--med-grey);
            font-size: 0.7rem;
            letter-spacing: 2px;
        }

        @keyframes spin { to{transform:rotate(360deg)} }
        .spin { animation: spin 0.8s linear infinite; display:inline-block; }

        @media (max-width: 640px) {
            body { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
            .top-bar { padding: 0 16px; }
            .page-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>

    <!-- TOP BAR -->
    <nav class="top-bar">
        <a href="dashboard.html" class="logo-link">
            <img src="logo.png" alt="IPAK Logo">
        </a>
        <div class="header-actions">
            <a href="dashboard.html" style="text-decoration:none;">
                <i class="fas fa-arrow-left user-icon" title="Back to Dashboard"></i>
            </a>
            <i class="fas fa-user-circle user-icon" title="My Profile"></i>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="container">

            <!-- PAGE HEADER -->
            <div class="page-header">
                <p>AI-Powered Tool</p>
                <h1>Smart Writer</h1>
            </div>

            <!-- CARD -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon"><i class="fas fa-wand-magic-sparkles"></i></div>
                    <span class="card-title">Generate Professional Draft</span>
                    <div class="card-badge">
                        <span class="status-dot"></span> Online
                    </div>
                </div>

                <div class="card-body">
                    <textarea id="userInput" rows="5"
                        placeholder="Draft likho... (e.g. Arbab ko email likho ke transport route update karein)"></textarea>

                    <div class="loading-track" id="loadingTrack">
                        <div class="loading-fill"></div>
                    </div>

                    <button class="btn-primary" id="mainBtn" onclick="generateDraft()">
                        <i class="fas fa-bolt"></i> Generate Draft
                    </button>
                </div>

                <!-- OUTPUT -->
                <div class="output-container" id="responseArea">
                    <div class="output-label">Professional Draft</div>
                    <div class="result-box" id="aiResult"></div>
                    <button class="btn-secondary" id="copyBtn" onclick="copyDraft()">
                        <i class="fas fa-copy"></i> Copy Text
                    </button>
                </div>
            </div>

            <footer>&copy; 2026 IPAK PORTAL | DESIGNED BY TEAM HR </footer>
        </div>
    </div>

    <script>
        const DS_KEY = 'sk-834dfa317e4745c4923ef11bc423c3c6';
        const DS_URL = 'https://api.deepseek.com/chat/completions';

        async function generateDraft() {
            const input  = document.getElementById('userInput').value.trim();
            const btn    = document.getElementById('mainBtn');
            const area   = document.getElementById('responseArea');
            const result = document.getElementById('aiResult');

            if (!input) { alert('Please type something first!'); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> Generating...';
            area.style.display = 'none';
            document.getElementById('loadingTrack').classList.add('active');

            try {
                const res = await fetch(DS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DS_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [{
                            role: 'user',
                            content: 'You are a professional corporate assistant for IPAK (International Packaging Films Ltd.). Rewrite the following rough notes into a formal, polite, and professional email or notice. Give only the final text: ' + input
                        }],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);

                const text = data.choices?.[0]?.message?.content?.trim();
                if (!text) throw new Error('No response from AI.');

                area.style.display = 'block';
                await typeText(result, text);

            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-bolt"></i> Generate Draft';
                document.getElementById('loadingTrack').classList.remove('active');
            }
        }

        async function typeText(el, text) {
            el.textContent = '';
            el.classList.add('typing');
            for (let i = 0; i < text.length; i += 3) {
                el.textContent += text.slice(i, i + 3);
                await new Promise(r => setTimeout(r, 10));
            }
            el.classList.remove('typing');
        }

        function copyDraft() {
            const text = document.getElementById('aiResult').innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = '<i class="fas fa-copy"></i> Copy Text';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        // Cursor
        const dot = document.getElementById('cursorDot');
        const outline = document.getElementById('cursorOutline');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top  = e.clientY + 'px';
            outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 400, fill: 'forwards' });
        });
        document.querySelectorAll('a, button, textarea').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // Ctrl+Enter shortcut
        document.getElementById('userInput').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generateDraft();
        });

        function logout() { window.location.href = 'index.html'; }
    </script>
</body>
</html>
