<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Succession Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-main: #0a0a0c; --bg-card: #141418; --text-main: #ffffff;
            --text-dim: #94a3b8; --border-color: #27272a;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #fbbc04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }
        
        .header { text-align: center; padding: 50px 20px 30px; }
        .header h1 { font-size: 38px; font-weight: 700; background: var(--gemini-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }
        
        #loader { text-align: center; color: var(--text-dim); padding: 50px; }
        .tabs-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .tab-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border-color); padding: 10px 22px; border-radius: 30px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .tab-btn:hover, .tab-btn.active { background: var(--text-main); color: var(--bg-main); }
        
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .card-wrapper { position: relative; border-radius: 16px; padding: 2px; background: var(--border-color); cursor: pointer; transition: 0.3s; }
        .card-wrapper:hover { background: var(--gemini-gradient); transform: translateY(-5px); }
        .card-content { background: var(--bg-card); border-radius: 14px; padding: 25px; text-align: center; height: 100%; }
        .card-avatar { width: 80px; height: 80px; border-radius: 50%; background: #27272a; margin-bottom: 15px; }
        .role-title { font-size: 18px; margin-bottom: 5px; }
        .incumbent-name { font-size: 14px; color: var(--text-dim); }
        
        /* Modal */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity:0; visibility:hidden; transition: 0.3s; }
        .modal-overlay.active { opacity:1; visibility:visible; }
        .modal-container { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; width: 90%; max-width: 700px; padding: 40px; }
    </style>
</head>
<body>
    <div class="header"><h1>IPAK Succession Insights</h1></div>
    <div class="container">
        <div id="loader">Fetching live data from IPAK...</div>
        <div class="tabs-container" id="tabs-container" style="display: none;"></div>
        <div class="cards-grid" id="grid-container"></div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-container">
            <button onclick="closeModal()" style="float:right; cursor:pointer;">Close</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMzUbqogregSYqVmsiXYS-5BMroUTogKNoDDJIoeyZWAedwFbbwPNmfeNMX6O766_2NeuM3gFhqhED/pub?output=csv";
        let globalData = [];

        Papa.parse(sheetCsvUrl, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                document.getElementById('loader').style.display = 'none';
                globalData = results.data;
                renderTabs();
                renderGrid(globalData);
            }
        });

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.style.display = 'flex';
            const depts = ["All", ...new Set(globalData.map(d => d.Department || "General"))];
            depts.forEach(d => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = d;
                btn.onclick = () => {
                    const filtered = d === "All" ? globalData : globalData.filter(item => item.Department === d);
                    renderGrid(filtered);
                };
                container.appendChild(btn);
            });
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = data.map(item => `
                <div class="card-wrapper" onclick="openModal('${item.Position}')">
                    <div class="card-content">
                        <div class="card-avatar"></div>
                        <h3 class="role-title">${item.Position}</h3>
                        <p class="incumbent-name">${item.Incumbent}</p>
                    </div>
                </div>
            `).join('');
        }

        function openModal(pos) {
            const item = globalData.find(d => d.Position === pos);
            document.getElementById('modal-content').innerHTML = `
                <h2>${item.Position}</h2>
                <p>Current: ${item.Incumbent}</p>
                <p>Successor: ${item['Successor 1'] || 'N/A'}</p>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() { document.getElementById('detailModal').classList.remove('active'); }
    </script>
</body>
</html>
