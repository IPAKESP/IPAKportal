<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAKportal - Smart AI Writer</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --accent: #6366f1;
            --border: #27272a;
            --text-p: #a1a1aa;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .writer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 450px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .header h2 { font-size: 18px; margin: 0; font-weight: 600; }
        .badge { background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .input-group { position: relative; margin-bottom: 15px; }
        textarea {
            width: 100%;
            background: #1a1a1c;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { background: #4f46e5; transform: translateY(-1px); }
        .action-btn:disabled { background: #27272a; cursor: not-allowed; }

        .output-section {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .output-label { font-size: 11px; color: var(--text-p); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .result-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #e4e4e7;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-p);
            font-size: 12px;
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
        }
        .copy-btn:hover { background: #27272a; color: #fff; }
    </style>
</head>
<body>

<div class="writer-card">
    <div class="header">
        <h2>IPAK Writing Assistant</h2>
        <span class="badge">Gemini Flash</span>
    </div>
    
    <div class="input-group">
        <textarea id="prompt" rows="4" placeholder="Roughly likho kya draft karna hai... (e.g. Arbab ko email likho transport update ke liye)"></textarea>
    </div>

    <button id="btn" class="action-btn" onclick="generateDraft()">Generate Professional Text</button>

    <div id="outputContainer" class="output-section">
        <span class="output-label">Drafted Result</span>
        <div id="result" class="result-box"></div>
        <button class="copy-btn" onclick="copyText()">Copy Draft</button>
    </div>
</div>

<script>
    // Aapki Gemini API Key
    const API_KEY = "AIzaSyAZna0gtwG-3ak9F2PQnXodUMFZ3INkREc"; 

    async function generateDraft() {
        const promptInput = document.getElementById('prompt').value;
        const btn = document.getElementById('btn');
        const output = document.getElementById('outputContainer');
        const resultBox = document.getElementById('result');

        if (!promptInput) return alert("Kuch toh likho!");

        btn.disabled = true;
        btn.innerText = "Writing... 🖋️";
        output.style.display = "none";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `You are a professional corporate assistant for IPAK. Rewrite the following rough notes into a formal, clear, and polite corporate email or notice. Do not include any conversational filler, just give the final draft. Rough Notes: ${promptInput}` }]
                    }]
                })
            });

            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;

            resultBox.innerText = text;
            output.style.display = "block";
        } catch (error) {
            alert("Error: Key check karein ya internet.");
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Professional Text";
        }
    }

    function copyText() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }
</script>

</body>
</html>
