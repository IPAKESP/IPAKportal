<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAKportal - Smart AI Writer</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --accent: #6366f1;
            --border: #27272a;
            --text-p: #a1a1aa;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .writer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .header h2 { font-size: 18px; margin: 0; font-weight: 600; }
        .badge { background: rgba(99, 102, 241, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        textarea {
            width: 100%;
            background: #1a1a1c;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            transition: 0.3s;
            margin-bottom: 15px;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { background: #4f46e5; transform: translateY(-1px); }
        .action-btn:disabled { background: #27272a; color: #71717a; cursor: not-allowed; }

        .output-section {
            margin-top: 20px;
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .result-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #e4e4e7;
            white-space: pre-wrap;
            min-height: 100px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-p);
            font-size: 12px;
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            float: right;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #27272a; color: #fff; }
    </style>
</head>
<body>

<div class="writer-card">
    <div class="header">
        <h2>Smart AI Writer</h2>
        <span class="badge">Gemini Flash</span>
    </div>
    
    <textarea id="prompt" rows="4" placeholder="Draft likho... (e.g. Write an email to Arbab asking for the transport route update by tomorrow)"></textarea>

    <button id="btn" class="action-btn" onclick="generateDraft()">Generate Professional Text</button>

    <div id="outputContainer" class="output-section">
        <span style="font-size: 11px; color: var(--text-p); margin-bottom: 8px; display: block;">PROPOSED DRAFT:</span>
        <div id="result" class="result-box"></div>
        <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy Draft</button>
        <div style="clear: both;"></div>
    </div>
</div>

<script>
    // Aapki Gemini API Key
    const API_KEY = "AIzaSyAZna0gtwG-3ak9F2PQnXodUMFZ3INkREc"; 

    async function generateDraft() {
        const promptText = document.getElementById('prompt').value.trim();
        const btn = document.getElementById('btn');
        const output = document.getElementById('outputContainer');
        const resultBox = document.getElementById('result');

        if (!promptText) {
            alert("Please enter some text!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Writing... 🖋️";
        output.style.display = "none";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `System: You are a professional corporate assistant at IPAK. Rewrite the user's rough notes into a formal, polite, and professional corporate email or notice. Output only the final drafted text.\n\nUser Notes: ${promptText}` }]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const finalResult = data.candidates[0].content.parts[0].text;
                resultBox.innerText = finalResult;
                output.style.display = "block";
            } else {
                throw new Error("Invalid response from AI");
            }

        } catch (error) {
            console.error("AI Error:", error);
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Professional Text";
        }
    }

    function copyText() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => { copyBtn.innerText = "Copy Draft"; }, 2000);
        });
    }
</script>

</body>
</html>
