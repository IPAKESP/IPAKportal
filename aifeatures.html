<script>
    // Aapki Nayi API Key
    const API_KEY = "AIzaSyCpjBt5h3IQFM6SHlO5DY47HuMkDOrvRmk"; 

    async function generateDraft() {
        const promptArea = document.getElementById('prompt');
        const promptText = promptArea.value.trim();
        const btn = document.getElementById('btn');
        const output = document.getElementById('outputContainer');
        const resultBox = document.getElementById('result');

        if (!promptText) {
            alert("Kuch toh type karein!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Writing... Please wait";
        output.style.display = "none";

        try {
            // FIX: v1 endpoint aur gemini-1.5-flash model name use kiya hai
            const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ 
                            text: `System: You are a professional corporate assistant at IPAK. Rewrite the user's rough notes into a formal, polite, and professional corporate email or notice. Output only the final body text.\n\nUser Notes: ${promptText}` 
                        }]
                    }]
                })
            });

            const data = await response.json();

            // Agar API koi error return kare
            if (data.error) {
                // Agar model not found ka masla phir bhi aaye, toh gemini-pro try karein
                if (data.error.message.includes("not found")) {
                    throw new Error("Model issue. Please try changing 'gemini-1.5-flash' to 'gemini-pro' in the code.");
                }
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                const finalResult = data.candidates[0].content.parts[0].text;
                resultBox.innerText = finalResult.trim();
                output.style.display = "block";
            } else {
                throw new Error("Response structure mismatch or empty content.");
            }

        } catch (error) {
            console.error("AI Error Details:", error);
            alert("AI Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Professional Text";
        }
    }

    function copyText() {
        const text = document.getElementById('result').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerText = "Copied!";
            setTimeout(() => { copyBtn.innerText = "Copy Text"; }, 2000);
        });
    }
</script>
