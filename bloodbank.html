<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Portal - Personnel Directory</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #203265;
            --lime: #A8C500;
            --white: #FFFFFF;
            --med-grey: #9C9C9C;
            --light-grey: #D4D4D4;
            --emergency-red: #ff4757;
            --bg-color: #F5F7FA;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --border-light: #E5E7EB; /* Added for standard header */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            cursor: none; 
        }
        
        body { color: var(--navy); background: var(--bg-color); min-height: 100vh; }

        /* CURSOR */
        .cursor-dot { width: 8px; height: 8px; background: var(--lime); position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; box-shadow: 0 0 10px var(--lime); }
        .cursor-outline { width: 40px; height: 40px; border: 2px solid var(--navy); position: fixed; pointer-events: none; z-index: 9999; border-radius: 50%; transition: width 0.2s, height 0.2s, background 0.2s; }
        body.hovering .cursor-outline { width: 60px; height: 60px; border-color: var(--lime); background: rgba(168, 197, 0, 0.1); }

        /* --- STANDARD HEADER STYLES --- */
        .top-bar {
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid var(--border-light);
            height: 64px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
        }

        .logo-link img { width: 100px; height: auto; transition: opacity 0.3s ease; }
        .logo-link:hover img { opacity: 0.8; }

        .header-actions { display: flex; align-items: center; gap: 16px; }
        
        .user-icon { font-size: 22px; color: var(--navy); transition: color 0.3s ease; cursor: pointer; }
        .user-icon:hover { color: var(--lime); }

        .logout-btn {
            padding: 6px 16px; background: transparent;
            border: 1px solid var(--border-light); color: var(--navy);
            border-radius: 6px; font-weight: 500; font-size: 13px;
            transition: all 0.3s ease; cursor: pointer;
        }
        .logout-btn:hover { border-color: var(--navy); background: #f3f4f6; }

        /* LAYOUT */
        .wrapper { padding-top: 120px; padding-bottom: 50px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* TITLE */
        .page-header { text-align: center; margin-bottom: 30px; }
        .page-header h1 { font-size: 2.2rem; color: var(--navy); position: relative; display: inline-block; padding-bottom: 10px; }
        .page-header h1::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 4px; background: var(--lime); border-radius: 2px; }
        .page-header p { color: var(--med-grey); margin-top: 10px; font-weight: 600; letter-spacing: 1px; }

        /* SEARCH */
        .search-container { max-width: 700px; margin: 0 auto 30px; position: relative; }
        .search-box { width: 100%; padding: 18px 30px; padding-left: 60px; border-radius: 15px; border: none; font-size: 1rem; box-shadow: var(--shadow); outline: none; transition: 0.3s; }
        .search-container i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--med-grey); font-size: 1.2rem; }
        .search-box:focus { box-shadow: 0 0 0 3px rgba(168, 197, 0, 0.3); }

        /* FILTERS */
        .blood-filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .blood-btn { padding: 8px 20px; border-radius: 50px; border: 1px solid var(--light-grey); background: var(--white); color: var(--med-grey); font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease; cursor: pointer; }
        .blood-btn:hover { transform: translateY(-2px); border-color: var(--navy); color: var(--navy); }
        .blood-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); box-shadow: 0 5px 15px rgba(32, 50, 101, 0.2); }

        /* GRID */
        .directory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; animation: slideUp 0.8s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARD DESIGN */
        .employee-card { background: var(--white); border-radius: 20px; padding: 25px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border-bottom: 5px solid transparent; box-shadow: var(--shadow); display: flex; flex-direction: column; }
        .employee-card:hover { transform: translateY(-10px); border-bottom-color: var(--lime); }

        .blood-tag { position: absolute; top: 20px; right: 20px; background: rgba(255, 71, 87, 0.1); color: var(--emergency-red); padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.5px; }

        /* NAME ON TOP (Font size reduced here) */
        .emp-name { font-size: 1.15rem; font-weight: 800; color: var(--navy); margin-bottom: 5px; text-transform: capitalize; padding-right: 60px; line-height: 1.2; }
        .emp-designation { font-size: 0.85rem; font-weight: 700; color: var(--lime); text-transform: uppercase; margin-bottom: 15px; }
        .emp-info { display: flex; align-items: center; gap: 12px; color: #555; font-size: 0.9rem; margin-bottom: 10px; text-transform: capitalize; }
        .emp-info i { color: var(--navy); width: 18px; text-align: center; }

        .emp-code-box { margin-top: auto; background: var(--bg-color); border: 1px dashed var(--light-grey); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; color: var(--navy); display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .emp-code-box span { color: var(--med-grey); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; }

        .contact-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; background: #f8f9fa; color: var(--navy); text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 0.9rem; border: 1px solid var(--light-grey); transition: 0.3s; }
        .contact-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

        /* LOADING */
        .loading-state { grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--navy); font-weight: 600; }
        .loading-state i { color: var(--lime); font-size: 2rem; margin-bottom: 10px; }

        footer { text-align: center; margin-top: 60px; color: var(--med-grey); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .cursor-dot, .cursor-outline { display: none; }
            * { cursor: auto; }
            .top-bar { padding: 0 20px; }
            .page-header h1 { font-size: 1.8rem; }
            .directory-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="top-bar">
        <a href="dashboard.html" class="logo-link">
            <img src="logo.png" alt="IPAK Logo">
        </a>
        <div class="header-actions">
            <a href="dashboard.html" style="text-decoration: none;">
                <i class="fas fa-arrow-left user-icon" title="Back to Dashboard"></i>
            </a>
            <i class="fas fa-user-circle user-icon" title="My Profile"></i>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="container">
            <div class="page-header">
                <p>Bridging humanity with lifesaving care.</p>
                <h1>IPAK BLOOD BANK</h1>
            </div>

            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" class="search-box" placeholder="Search by Name, Designation or Emp Code...">
            </div>

            <div class="blood-filter-container">
                <button class="blood-btn active" onclick="filterByBlood('All', this)">All</button>
                <button class="blood-btn" onclick="filterByBlood('A+', this)">A+</button>
                <button class="blood-btn" onclick="filterByBlood('A-', this)">A-</button>
                <button class="blood-btn" onclick="filterByBlood('B+', this)">B+</button>
                <button class="blood-btn" onclick="filterByBlood('B-', this)">B-</button>
                <button class="blood-btn" onclick="filterByBlood('O+', this)">O+</button>
                <button class="blood-btn" onclick="filterByBlood('O-', this)">O-</button>
                <button class="blood-btn" onclick="filterByBlood('AB+', this)">AB+</button>
                <button class="blood-btn" onclick="filterByBlood('AB-', this)">AB-</button>
            </div>

            <main class="directory-grid" id="empGrid">
                <div class="loading-state" id="loadingData">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Fetching Live Data from Google Sheets...</p>
                </div>
            </main>

            <footer>
                &copy; 2026 IPAK PORTAL | BLOOD BANK
            </footer>
        </div>
    </div>

    <script>
        function logout() { window.location.href = "index.html"; }

        // CURSOR LOGIC
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;
            outline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 400, fill: "forwards" });
        });

        function applyHoverEffects() {
            document.querySelectorAll('a, button, input, .employee-card').forEach(el => {
                el.removeEventListener('mouseenter', addHoverClass);
                el.removeEventListener('mouseleave', removeHoverClass);
                el.addEventListener('mouseenter', addHoverClass);
                el.addEventListener('mouseleave', removeHoverClass);
            });
        }
        const addHoverClass = () => document.body.classList.add('hovering');
        const removeHoverClass = () => document.body.classList.remove('hovering');

        // --- GOOGLE SHEETS FETCH LOGIC ---
        const sheetCSVUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrNQpq641epv1fwbFpW21_1MyJdfrnJS6NUk0yA_VyKeNSPtE7IZ0NMbNAL8JJ02oOzvSbZxatqc5o/pub?gid=15022141&single=true&output=csv';

        async function fetchBloodBankData() {
            try {
                const response = await fetch(sheetCSVUrl);
                const csvData = await response.text();
                processCSVData(csvData);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('loadingData').innerHTML = '<i class="fas fa-exclamation-triangle" style="color:var(--emergency-red);"></i><p>Error connecting to Database.</p>';
            }
        }

        function parseCSV(str) {
            const arr = [];
            let quote = false;  
            let col = '', c;
            for (let i = 0; i < str.length; i++) {
                c = str[i];
                if (c === '"' && str[i+1] === '"') { col += c; i++; } 
                else if (c === '"') { quote = !quote; } 
                else if (c === ',' && !quote) { arr.push(col.trim()); col = ''; } 
                else if (c === '\n' && !quote) { arr.push(col.trim()); return [arr, str.substring(i+1)]; } 
                else if (c === '\r' && !quote) { }
                else { col += c; }
            }
            arr.push(col.trim());
            return [arr, ''];
        }

        function processCSVData(csvText) {
            const grid = document.getElementById('empGrid');
            grid.innerHTML = ''; 
            
            let remainingText = csvText;
            let row;
            let isFirstRow = true;

            while (remainingText.length > 0) {
                [row, remainingText] = parseCSV(remainingText);
                
                if (isFirstRow) {
                    isFirstRow = false;
                    continue; 
                }

                if (row.length >= 6 && row[2]) { 
                    const empCode = row[1] || 'N/A';        // Column B: Employee Code
                    const name = row[2] || 'Unknown';       // Column C: Name
                    const designation = row[3] || 'Staff';  // Column D: Designation
                    const department = row[4] || 'IPAK';    // Column E: Department
                    const phone = row[5] || '';             // Column F: Phone Number
                    const blood = (row[6] || 'Unknown').toUpperCase(); // Column G: Blood Group

                    const cardHTML = `
                        <div class="employee-card" data-blood="${blood}">
                            <div class="emp-name">${name}</div>
                            <div class="blood-tag"><i class="fas fa-droplet"></i> ${blood}</div>
                            <div class="emp-designation">${designation}</div>
                            <div class="emp-info"><i class="fas fa-building"></i> ${department}</div>
                            
                            <div class="emp-code-box">
                                <span>Employee Code</span>
                                <div class="code-text">${empCode}</div>
                            </div>
                            
                            <a href="tel:${phone}" class="contact-btn"><i class="fas fa-phone-alt"></i> ${phone}</a>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', cardHTML);
                }
            }
            applyHoverEffects();
        }

        window.onload = fetchBloodBankData;

        // --- DYNAMIC FILTERING LOGIC ---
        function filterByBlood(bloodGroup, btnElement) {
            document.querySelectorAll('.blood-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('globalSearch').value = '';

            const cards = document.querySelectorAll('.employee-card');
            cards.forEach(card => {
                const cardBlood = card.getAttribute('data-blood');
                if (bloodGroup === 'All' || cardBlood === bloodGroup) {
                    card.style.display = 'flex'; 
                    card.style.animation = 'none'; 
                    setTimeout(() => card.style.animation = 'fadeIn 0.5s ease', 10);
                } else {
                    card.style.display = 'none';
                }
            });
        }

        document.getElementById('globalSearch').addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            document.querySelectorAll('.blood-btn').forEach(btn => btn.classList.remove('active'));
            
            const cards = document.querySelectorAll('.employee-card');
            cards.forEach(card => {
                const name = card.querySelector('.emp-name').textContent.toLowerCase();
                const role = card.querySelector('.emp-designation').textContent.toLowerCase();
                const blood = card.querySelector('.blood-tag').textContent.toLowerCase(); 
                const code = card.querySelector('.code-text').textContent.toLowerCase(); 
                
                if (name.includes(filter) || role.includes(filter) || blood.includes(filter) || code.includes(filter)) {
                    card.style.display = "flex";
                    card.style.animation = "fadeIn 0.4s ease";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
