<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAKportal - Replicate ID Studio</title>
    <style>
        body {
            background-color: #09090b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .bento-card {
            background-color: #121214;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            color: #f4f4f5;
        }
        .header h2 { margin: 0 0 5px 0; font-size: 20px; }
        .desc { font-size: 13px; color: #a1a1aa; margin-bottom: 20px; line-height: 1.4; }
        
        .upload-zone {
            border: 1px dashed #3f3f46;
            background-color: #18181b;
            border-radius: 12px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-zone:hover { border-color: #3b82f6; }
        .upload-zone input { display: none; }
        .file-name { font-size: 13px; font-weight: 500; color: #e4e4e7; }

        .btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover { background-color: #2563eb; }
        .btn:disabled { background-color: #27272a; color: #71717a; cursor: not-allowed; }

        .result-wrapper {
            margin-top: 24px;
            display: none;
            text-align: center;
            border-top: 1px solid #27272a;
            padding-top: 20px;
        }
        .photo-frame {
            width: 150px;
            height: 190px;
            object-fit: cover;
            border: 2px solid #fff;
            background-color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .download-btn {
            margin-top: 15px;
            background: transparent;
            border: 1px solid #3f3f46;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="bento-card">
        <div class="header"><h2>📸 Pro ID Studio (Replicate)</h2></div>
        <div class="desc">Upload casual photo. AI will preserve the face and apply a formal navy blue suit.</div>

        <label class="upload-zone" id="dropArea">
            <div style="font-size: 24px; margin-bottom: 8px;">📁</div>
            <span class="file-name" id="fileNameDisplay">Click to upload face photo</span>
            <input type="file" id="photoInput" accept="image/png, image/jpeg">
        </label>

        <button id="generateBtn" class="btn" onclick="processReplicateAI()">Apply Formal Suit</button>

        <div id="resultArea" class="result-wrapper">
            <p id="statusText" style="font-size: 12px; color: #10b981; margin-top: 0;">✨ AI Processing Complete</p>
            <img id="passportOutput" class="photo-frame" src="" alt="Formal Photo">
            <button class="btn download-btn" onclick="downloadImage()">Download Photo</button>
        </div>
    </div>

    <script>
        // Aapki Replicate API Key add kar di gayi hai
        const REPLICATE_TOKEN = "r8_OBLxXa9oeBvMCuSW5qqXlA5Lybf3bCJ4bYeVZ"; 

        const fileInput = document.getElementById('photoInput');
        const fileNameUI = document.getElementById('fileNameDisplay');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) fileNameUI.innerText = e.target.files[0].name;
        });

        async function processReplicateAI() {
            const file = fileInput.files[0];
            const btn = document.getElementById('generateBtn');
            const resultArea = document.getElementById('resultArea');
            const outputImage = document.getElementById('passportOutput');
            const statusText = document.getElementById('statusText');

            if (!file) return alert("Please select a photo first.");

            btn.disabled = true;
            btn.innerText = "Initializing AI Model... ⏳";
            resultArea.style.display = "none";

            try {
                // Convert image to Data URL (base64) for Replicate
                const base64Image = await fileToDataUrl(file);
                
                // Replicate API endpoint using CORS proxy
                const PROXY_URL = "https://corsproxy.io/?";
                const API_URL = PROXY_URL + encodeURIComponent("https://api.replicate.com/v1/predictions");
                
                btn.innerText = "Sending to Replicate... ⏳";

                // Step 1: Create the prediction request
                const createResponse = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Token ${REPLICATE_TOKEN}`,
                        "Content-Type": "application/json",
                        "x-requested-with": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        version: "a9758cbfbd5f3c2094457d996681af52552901775aa2d6dd0b17fd15df959bef", // SDXL ControlNet
                        input: {
                            image: base64Image,
                            prompt: "Professional passport photo, man wearing a formal navy blue pentcoat suit and green tie, pure white background, high quality, highly detailed",
                            negative_prompt: "casual clothes, messy, bad lighting, ugly, distorted face",
                            prompt_strength: 0.8
                        }
                    })
                });

                if (!createResponse.ok) throw new Error("Failed to start prediction. Check proxy or API credits.");
                
                let prediction = await createResponse.json();
                
                // Step 2: Polling - Wait for the AI to finish generating
                const pollUrl = PROXY_URL + encodeURIComponent(prediction.urls.get);
                
                while (
                    prediction.status !== "succeeded" &&
                    prediction.status !== "failed" &&
                    prediction.status !== "canceled"
                ) {
                    btn.innerText = `Processing: ${prediction.status}... ⏳`;
                    await new Promise(r => setTimeout(r, 2000)); // Wait 2 seconds before checking again
                    
                    const pollResponse = await fetch(pollUrl, {
                        headers: {
                            "Authorization": `Token ${REPLICATE_TOKEN}`,
                            "x-requested-with": "XMLHttpRequest"
                        }
                    });
                    prediction = await pollResponse.json();
                }

                if (prediction.status === "succeeded") {
                    outputImage.src = Array.isArray(prediction.output) ? prediction.output[0] : prediction.output;
                    statusText.innerText = "✨ Formal Photo Ready";
                    resultArea.style.display = "block";
                } else {
                    throw new Error("AI Generation Failed: " + prediction.error);
                }

            } catch (error) {
                alert("Error: " + error.message);
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerText = "Apply Formal Suit";
            }
        }

        // Helper function to convert File to Data URL (Base64)
        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = document.getElementById('passportOutput').src;
            link.download = 'IPAK_Formal_Photo.png';
            link.click();
        }
    </script>
</body>
</html>
