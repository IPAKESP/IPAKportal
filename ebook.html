<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Portal - E-BOOKS Library</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #203265;
            --lime: #A8C500;
            --white: #FFFFFF;
            --med-grey: #9C9C9C;
            --light-grey: #D4D4D4;
            --emergency-red: #ff4757;
            --bg-color: #F5F7FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        
        body { 
            color: var(--navy); 
            background: var(--bg-color); 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot {
            width: 8px; height: 8px; background: var(--lime);
            position: fixed; pointer-events: none; z-index: 10000;
            border-radius: 50%; box-shadow: 0 0 10px var(--lime);
        }
        .cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--navy);
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; transition: width 0.2s, height 0.2s, background 0.2s;
        }
        body.hovering .cursor-outline {
            width: 60px; height: 60px; border-color: var(--lime);
            background: rgba(168, 197, 0, 0.1);
        }

        /* --- TOP BAR --- */
        .top-bar {
            background: var(--white); height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo-link img { width: 80px; height: auto; transition: 0.3s; }
        .logo-link:hover img { transform: scale(1.1); }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .user-icon { font-size: 1.8rem; color: var(--navy); transition: 0.3s; }
        .user-icon:hover { color: var(--lime); }
        .logout-btn {
            padding: 10px 20px; background: transparent; border: 2px solid var(--navy);
            color: var(--navy); border-radius: 8px; font-weight: 600; transition: 0.3s;
        }
        .logout-btn:hover { background: var(--navy); color: var(--white); }

        /* --- LAYOUT & HEADER --- */
        .wrapper { padding-top: 120px; padding-bottom: 50px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .page-header { text-align: center; margin-bottom: 40px; animation: float 6s ease-in-out infinite; }
        .page-header h1 { font-size: 2.5rem; color: var(--navy); }
        .page-header p { color: var(--lime); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; font-weight: 700; }

        .search-container { display: flex; justify-content: center; margin-bottom: 50px; }
        .search-box {
            width: 100%; max-width: 500px; padding: 15px 25px; border-radius: 50px; border: 1px solid var(--light-grey);
            outline: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .search-box:focus { border-color: var(--lime); box-shadow: 0 0 15px rgba(168, 197, 0, 0.1); }

        /* --- BOOK CARDS --- */
        .category-title {
            color: var(--navy); font-size: 1rem; margin: 40px 0 20px; text-transform: uppercase; letter-spacing: 2px;
            font-weight: 700; display: flex; align-items: center; gap: 15px;
        }
        .category-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--light-grey); }

        .audio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .audio-card {
            background: var(--white); border-radius: 20px; padding: 25px; display: flex; align-items: center; gap: 20px;
            text-decoration: none; color: inherit; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden;
        }
        .audio-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(168, 197, 0, 0.1), transparent);
        }
        .audio-card:hover::after { animation: sweep 1.5s; }
        @keyframes sweep { 0% { left: -100%; } 100% { left: 200%; } }
        .audio-card:hover { transform: translateY(-8px); border-color: var(--lime); box-shadow: 0 15px 30px rgba(32, 50, 101, 0.1); }

        .play-icon-box {
            width: 50px; height: 50px; background: var(--navy); border-radius: 50%; display: flex;
            justify-content: center; align-items: center; flex-shrink: 0; color: white; transition: 0.3s;
        }
        .audio-card:hover .play-icon-box { background: var(--lime); color: var(--navy); transform: rotate(360deg); }

        .track-info { flex-grow: 1; }
        .track-title { font-weight: 700; margin-bottom: 5px; color: var(--navy); font-size: 1rem; }
        .track-meta { color: var(--med-grey); font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }

        footer { text-align: center; margin-top: 80px; padding: 40px 0; color: var(--med-grey); font-size: 0.8rem; letter-spacing: 2px; }

        /* --- PDF MODAL STYLES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(32, 50, 101, 0.85); z-index: 100000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); animation: fadeInModal 0.3s ease;
        }
        .modal-container {
            background: var(--bg-color); width: 90%; max-width: 1200px; height: 90vh; border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.95); animation: scaleInModal 0.3s ease forwards;
        }
        .modal-header {
            background: var(--white); padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid var(--lime);
        }
        .modal-header h3 { color: var(--navy); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--emergency-red); transition: 0.3s; }
        .close-btn:hover { transform: scale(1.2) rotate(90deg); color: #ff0000; }
        .modal-body { flex-grow: 1; width: 100%; height: 100%; }
        #pdfViewer { width: 100%; height: 100%; border: none; background: var(--light-grey); }

        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleInModal { from { transform: scale(0.95); } to { transform: scale(1); } }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
            .top-bar { padding: 0 20px; }
            .audio-grid { grid-template-columns: 1fr; }
            .modal-container { width: 95%; height: 95vh; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="top-bar">
        <a href="dashboard.html" class="logo-link">
            <img src="logo.png" alt="IPAK">
        </a>
        <div class="header-actions">
            <a href="dashboard.html" style="text-decoration: none;">
                <i class="fas fa-arrow-left user-icon" title="Back to Dashboard"></i>
            </a>
            <i class="fas fa-user-circle user-icon"></i>
            <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="container">
            
            <div class="page-header">
                <p>IPAK Knowledge Center</p>
                <h1>E-BOOKS Library</h1>
            </div>

            <div class="search-container">
                <input type="text" id="bookSearch" class="search-box" placeholder="Search for books, titles...">
            </div>

            <div class="category-title"><i class="fas fa-folder-open" style="color: var(--lime);"></i> Business & Trading Strategies</div>
            <div class="audio-grid">
                
                <a href="javascript:void(0);" class="audio-card" onclick="openPDF('https://drive.google.com/file/d/1yGsAKgIgSEIBqaS4EkVDWBKdsKqLxdHW/preview', 'The Encyclopedia of Trading Strategies')">
                    <div class="play-icon-box"><i class="fas fa-book-open"></i></div>
                    <div class="track-info">
                        <div class="track-title">The Encyclopedia of Trading Strategies</div>
                        <div class="track-meta">eBook • PDF Format</div>
                    </div>
                </a>

                <a href="javascript:void(0);" class="audio-card" onclick="openPDF('https://drive.google.com/file/d/1B4Acs-7zpzDHHOfZUNp2vBEdBHSyOAEU/preview', 'Ten Commandments of Small Business')">
                    <div class="play-icon-box"><i class="fas fa-book-open"></i></div>
                    <div class="track-info">
                        <div class="track-title">Ten Commandments of Small Business</div>
                        <div class="track-meta">Document • DOC Format</div>
                    </div>
                </a>

                <a href="javascript:void(0);" class="audio-card" onclick="openPDF('https://drive.google.com/file/d/14qFUvZe8s-r2I_UJMv-wSQDitcB1mgx3/preview', 'Complete Idiots Guide to Small Business')">
                    <div class="play-icon-box"><i class="fas fa-book-open"></i></div>
                    <div class="track-info">
                        <div class="track-title">Complete Idiots Guide to Small Business</div>
                        <div class="track-meta">eBook • PDF Format</div>
                    </div>
                </a>

            </div>

            <footer>&copy; 2026 IPAK PORTAL | SECURE ACCESS</footer>
        </div>
    </div>

    <div id="pdfModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Reading Book...</h3>
                <button class="close-btn" onclick="closePDF()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <iframe id="pdfViewer" src="" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Smooth Cursor
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX; const posY = e.clientY;
            dot.style.left = `${posX}px`; dot.style.top = `${posY}px`;
            outline.animate({ left: `${posX - 20}px`, top: `${posY - 20}px` }, { duration: 400, fill: "forwards" });
        });

        document.querySelectorAll('a, button, input, .audio-card').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // Search Filter
        document.getElementById('bookSearch').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            document.querySelectorAll('.audio-card').forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = text.includes(filter) ? "flex" : "none";
            });
            
            document.querySelectorAll('.category-title').forEach(title => {
                let nextGrid = title.nextElementSibling;
                let visibleCards = 0;
                if(nextGrid && nextGrid.classList.contains('audio-grid')) {
                    visibleCards = Array.from(nextGrid.children).filter(c => c.style.display !== 'none').length;
                }
                title.style.display = (visibleCards === 0 && filter !== '') ? 'none' : 'flex';
            });
        });

        // --- PDF READER MODAL LOGIC ---
        function openPDF(pdfPath, bookTitle) {
            document.getElementById('modalTitle').innerText = bookTitle;
            document.getElementById('pdfViewer').src = pdfPath;
            document.getElementById('pdfModal').style.display = 'flex';
        }

        function closePDF() {
            document.getElementById('pdfModal').style.display = 'none';
            document.getElementById('pdfViewer').src = ''; // Clear source to stop loading
        }
    </script>
</body>
</html>
