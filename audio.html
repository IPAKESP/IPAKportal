<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Portal - Audio Library</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #203265;
            --lime: #A8C500;
            --white: #FFFFFF;
            --med-grey: #9C9C9C;
            --light-grey: #D4D4D4;
            --bg-color: #F5F7FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: none; }
        
        body { 
            color: var(--navy); 
            background: var(--bg-color); 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        /* --- CUSTOM CURSOR --- */
        .cursor-dot {
            width: 8px; height: 8px; background: var(--lime);
            position: fixed; pointer-events: none; z-index: 10000;
            border-radius: 50%; box-shadow: 0 0 10px var(--lime);
        }
        .cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--navy);
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; transition: width 0.2s, height 0.2s, background 0.2s;
        }
        body.hovering .cursor-outline {
            width: 60px; height: 60px; border-color: var(--lime);
            background: rgba(168, 197, 0, 0.1);
        }

        /* --- TOP BAR --- */
        .top-bar {
            background: var(--white);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .logo-link { text-decoration: none; }
        .logo-link:hover h2 { transform: scale(1.05); transition: 0.3s; }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .user-icon { font-size: 1.8rem; color: var(--navy); transition: 0.3s; }
        .user-icon:hover { color: var(--lime); }
        .logout-btn {
            padding: 10px 20px; background: transparent; border: 2px solid var(--navy);
            color: var(--navy); border-radius: 8px; font-weight: 600; transition: 0.3s;
        }
        .logout-btn:hover { background: var(--navy); color: var(--white); }

        /* --- LAYOUT --- */
        .wrapper { padding-top: 120px; padding-bottom: 50px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- HEADER --- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .page-header { text-align: center; margin-bottom: 40px; animation: float 6s ease-in-out infinite; }
        .page-header h1 { font-size: 2.5rem; color: var(--navy); }
        .page-header p { color: var(--lime); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; font-weight: 700; }

        /* --- AUDIO SECTION --- */
        .category-title {
            color: var(--navy); font-size: 1rem; margin: 40px 0 20px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
            display: flex; align-items: center; gap: 15px;
        }
        .category-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--light-grey); }

        .spotify-wrapper {
            max-width: 600px;
            transition: 0.4s;
        }
        .spotify-wrapper:hover {
            transform: translateY(-5px);
        }

        footer { text-align: center; margin-top: 80px; padding: 40px 0; color: var(--med-grey); font-size: 0.8rem; letter-spacing: 2px; }

        @media (max-width: 768px) {
            body { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
            .top-bar { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="top-bar">
        <a href="dashboard.html" class="logo-link">
            <h2 style="color: var(--navy);">IPAK</h2>
        </a>
        <div class="header-actions">
            <a href="dashboard.html" style="text-decoration: none;">
                <i class="fas fa-arrow-left user-icon" title="Back to Dashboard"></i>
            </a>
            <i class="fas fa-user-circle user-icon"></i>
            <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="container">
            
            <div class="page-header">
                <p>Knowledge Base</p>
                <h1>Audio Library</h1>
            </div>

            <div class="category-title"><i class="fab fa-spotify" style="color: #1DB954;"></i> Featured Audiobook</div>
            
            <!-- SPOTIFY EMBED START -->
            <div class="spotify-wrapper">
                <iframe data-testid="embed-iframe" style="border-radius:12px; box-shadow: 0 10px 20px rgba(32, 50, 101, 0.1);" src="https://open.spotify.com/embed/album/3IO9AF3OdJZvMjPf7wx2tW?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
            <!-- SPOTIFY EMBED END -->

            <footer>&copy; 2026 IPAK PORTAL | SECURE ACCESS</footer>
        </div>
    </div>

    <script>
        // Smooth Cursor
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX; const posY = e.clientY;
            dot.style.left = `${posX}px`; dot.style.top = `${posY}px`;
            outline.animate({ left: `${posX - 20}px`, top: `${posY - 20}px` }, { duration: 400, fill: "forwards" });
        });

        // Hover effect for cursor
        document.querySelectorAll('a, button, iframe, .spotify-wrapper').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });
    </script>
</body>
</html>
