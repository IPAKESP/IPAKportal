<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAKportal - Smart AI Writer</title>
    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #121214;
            --accent: #6366f1;
            --border: #27272a;
            --text-p: #a1a1aa;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .writer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h2 { font-size: 18px; margin: 0; color: #fff; }

        textarea {
            width: 100%;
            background: #1c1c1f;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .action-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:disabled {
            background: #27272a;
            cursor: not-allowed;
        }

        .output-section {
            margin-top: 20px;
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .result-box {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            font-size: 14px;
            line-height: 1.6;
            color: #e4e4e7;
            white-space: pre-wrap;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-p);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            float: right;
        }
    </style>
</head>
<body>

<div class="writer-card">
    <div class="header">
        <h2>Smart AI Writer</h2>
        <span style="font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase;">IPAKportal</span>
    </div>
    
    <textarea id="promptArea" rows="4" placeholder="Roughly type your message here..."></textarea>

    <button id="submitBtn" class="action-btn" onclick="runGeminiAI()">Generate Draft</button>

    <div id="outputContainer" class="output-section">
        <div id="resultText" class="result-box"></div>
        <button class="copy-btn" onclick="copyToClipboard()">Copy Text</button>
        <div style="clear: both;"></div>
    </div>
</div>

<script>
    // Aapki Nayi API Key
    const MY_KEY = "AIzaSyCpjBt5h3IQFM6SHlO5DY47HuMkDOrvRmk"; 

    async function runGeminiAI() {
        const input = document.getElementById('promptArea').value.trim();
        const btn = document.getElementById('submitBtn');
        const container = document.getElementById('outputContainer');
        const result = document.getElementById('resultText');

        if (!input) {
            alert("Please enter some text first.");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processing...";
        container.style.display = "none";

        try {
            // Updated Endpoint: v1 version
            const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`;

            const response = await fetch(URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "You are a corporate assistant. Rewrite the following as a professional email/notice for a company called IPAK: " + input }]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                throw new Error(data.error.message);
            }

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                result.innerText = data.candidates[0].content.parts[0].text;
                container.style.display = "block";
            } else {
                throw new Error("API returned an empty response.");
            }

        } catch (err) {
            console.error("Error:", err);
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Generate Draft";
        }
    }

    function copyToClipboard() {
        const text = document.getElementById('resultText').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied to clipboard!");
        });
    }
</script>

</body>
</html>
