<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Succession Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* Gemini Premium Dark Theme - Vercel / Google Aesthetic */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #141418;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #27272a;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #fbbc04);
            --badge-bg: rgba(66, 133, 244, 0.1);
            --badge-text: #8ab4f8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        /* Centered Header Layout (No Sidebars) */
        .header { text-align: center; padding: 50px 20px 30px; }
        .header h1 { 
            font-size: 38px; font-weight: 700; 
            background: var(--gemini-gradient); background-size: 200% auto; 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            margin-bottom: 10px; 
        }
        .header p { color: var(--text-dim); font-size: 16px; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* Loading & Error States */
        #loader { 
            text-align: center; color: var(--text-dim); padding: 40px; font-size: 16px; 
            background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); 
            max-width: 500px; margin: 0 auto;
        }
        .loader-spinner {
            display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-top-color: #9b72cb; animation: spin 1s ease-in-out infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Clean Grid View */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

        .card-wrapper {
            position: relative; border-radius: 16px; padding: 2px; background: var(--border-color); cursor: pointer; transition: all 0.3s ease;
        }
        .card-wrapper:hover {
            background: var(--gemini-gradient); background-size: 300% 300%; animation: gradientBorder 3s ease infinite; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(155, 114, 203, 0.2);
        }

        @keyframes gradientBorder { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card-content { background-color: var(--bg-card); border-radius: 14px; height: 100%; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--border-color); background-color: #27272a; transition: border-color 0.3s ease; }
        .card-wrapper:hover .card-avatar { border-color: #9b72cb; }
        .role-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; color: var(--text-main); }
        .incumbent-name { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; }
        .view-btn { margin-top: auto; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #9b72cb; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        /* Modal (Popup) Styling */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-container { background-color: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; position: relative; transform: scale(0.9); transition: transform 0.3s ease; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .modal-overlay.active .modal-container { transform: scale(1); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 10; transition: all 0.2s ease; }
        .close-btn:hover { background: #d96570; border-color: #d96570; }
        
        .modal-header { padding: 40px 40px 30px; border-bottom: 1px solid var(--border-color); background: linear-gradient(to bottom, rgba(155, 114, 203, 0.05), transparent); display: flex; gap: 25px; align-items: center; }
        .modal-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #9b72cb; }
        .modal-role-info h2 { font-size: 26px; margin-bottom: 5px; }
        .modal-role-info p { color: var(--text-dim); font-size: 15px; margin-bottom: 15px; }
        .modal-role-details { font-size: 14px; color: #d1d5db; line-height: 1.6; background: var(--bg-card); padding: 15px; border-radius: 8px; border-left: 3px solid #4285f4; }
        
        .modal-body { padding: 30px 40px 40px; }
        .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: #9b72cb; margin-bottom: 20px; font-weight: 600; }
        .successors-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .successor-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; gap: 15px; }
        .succ-avatar { width: 55px; height: 55px; border-radius: 50%; background: var(--border-color); object-fit: cover; }
        .succ-info h4 { font-size: 16px; margin-bottom: 4px; color: var(--text-main); }
        .succ-info p { font-size: 13px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.4; }
        .readiness-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; background: var(--badge-bg); color: var(--badge-text); border: 1px solid rgba(66, 133, 244, 0.3); display: inline-block; }

        @media (max-width: 768px) {
            .modal-header { flex-direction: column; text-align: center; padding: 30px 20px; }
            .modal-body { padding: 20px; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9b72cb; }
    </style>
</head>
<body>

    <div class="header">
        <h1>IPAK Succession Insights</h1>
        <p>Live Corporate Pipeline linked with Workspace</p>
    </div>

    <div class="container">
        <div id="loader">
            <div class="loader-spinner"></div><br>
            Fetching live data from IPAK Database...
        </div>
        
        <div class="cards-grid" id="grid-container" style="display: none;"></div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-container">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content-area"></div>
        </div>
    </div>

    <script>
        // Aapka original link pubhtml ka tha, humne usay CSV export link mein convert kar diya hai:
        const originalUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2eGdEbyAtUT2PkOaZ59jX6g7mvXHAOtgOvOO7BxUWfo70e56-0RwMKZJbXzEMTIQpC6cHK6g65Qw8/pubhtml?gid=2081750403&single=true";
        const sheetCsvUrl = originalUrl.replace("/pubhtml", "/pub") + "&output=csv";
        
        let globalData = [];

        // Helper function to loosely match column names (case insensitive)
        function findKey(row, possibleNames) {
            const keys = Object.keys(row);
            for (let key of keys) {
                let lowerKey = key.toLowerCase().trim();
                for (let name of possibleNames) {
                    if (lowerKey.includes(name.toLowerCase())) return key;
                }
            }
            return null; // Return null if not found
        }

        // Fetch Data using PapaParse with header: true
        Papa.parse(sheetCsvUrl, {
            download: true,
            header: true, // Now it reads your fixed headers
            skipEmptyLines: true,
            complete: function(results) {
                const rawData = results.data;
                
                if(!rawData || rawData.length === 0) {
                    document.getElementById('loader').innerHTML = `<span style="color:#d96570;">Sheet is empty or couldn't load.</span>`;
                    return;
                }

                // Hide loader, show grid
                document.getElementById('loader').style.display = 'none';
                document.getElementById('grid-container').style.display = 'grid';
                
                globalData = rawData.map((row, index) => {
                    // Smart Column Mapping: Finds the column even if spelling changes slightly
                    const roleCol = findKey(row, ["role", "position", "designation"]) || Object.keys(row)[0];
                    const incCol = findKey(row, ["incumbent", "current", "name", "head"]) || Object.keys(row)[1];
                    const detCol = findKey(row, ["detail", "description"]) || Object.keys(row)[2];

                    let successorsList = [];
                    
                    // Support for up to 3 Successors automatically
                    for(let i=1; i<=3; i++) {
                        const succNameCol = findKey(row, [`successor ${i}`, `successor${i}`]);
                        const succDetCol = findKey(row, [`detail ${i}`, `details ${i}`, `detail${i}`]);
                        const succReadCol = findKey(row, [`readiness ${i}`, `status ${i}`, `readiness${i}`]);

                        if (succNameCol && row[succNameCol] && row[succNameCol].trim() !== "") {
                            successorsList.push({
                                name: row[succNameCol],
                                details: (succDetCol && row[succDetCol]) ? row[succDetCol] : "No details provided.",
                                badge: (succReadCol && row[succReadCol]) ? row[succReadCol] : "Ready"
                            });
                        }
                    }

                    return {
                        id: index,
                        role: row[roleCol] || "Unknown Role",
                        incumbent: row[incCol] || "Not Assigned",
                        roleDetails: row[detCol] || "No description provided.",
                        successors: successorsList
                    };
                }).filter(item => item.role !== "Unknown Role" && item.role.trim() !== "");

                renderGrid(globalData);
            },
            error: function(err) {
                document.getElementById('loader').innerHTML = `Error fetching data: ${err.message}`;
            }
        });

        // UI Rendering Logic
        const gridContainer = document.getElementById('grid-container');
        const modalOverlay = document.getElementById('detailModal');
        const modalContentArea = document.getElementById('modal-content-area');

        function renderGrid(data) {
            gridContainer.innerHTML = '';
            data.forEach((item) => {
                // Generates an avatar dynamically based on the incumbent's name
                const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(item.incumbent)}&background=27272a&color=fff&size=150`;
                
                const card = document.createElement('div');
                card.className = 'card-wrapper';
                card.onclick = () => openModal(item.id);

                card.innerHTML = `
                    <div class="card-content">
                        <img src="" alt="" class="card-avatar" onerror="this.src='${defaultAvatar}'">
                        <h3 class="role-title">${item.role}</h3>
                        <p class="incumbent-name">${item.incumbent}</p>
                        <div class="view-btn">View Pipeline <span>→</span></div>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function openModal(id) {
            const dataItem = globalData.find(item => item.id === id);
            if(!dataItem) return;

            const incFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(dataItem.incumbent)}&background=27272a&color=fff&size=200`;
            let successorsHTML = '';
            
            if (dataItem.successors.length > 0) {
                dataItem.successors.forEach(succ => {
                    const succFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(succ.name)}&background=1c1c22&color=fff&size=150`;
                    successorsHTML += `
                        <div class="successor-item">
                            <img src="" class="succ-avatar" onerror="this.src='${succFallback}'">
                            <div class="succ-info">
                                <h4>${succ.name}</h4>
                                <p>${succ.details}</p>
                                <span class="readiness-badge">${succ.badge}</span>
                            </div>
                        </div>`;
                });
            } else {
                successorsHTML = `<p style="color:var(--text-dim); width:100%;">No successors currently mapped for this position.</p>`;
            }

            modalContentArea.innerHTML = `
                <div class="modal-header">
                    <img src="" class="modal-avatar" onerror="this.src='${incFallback}'">
                    <div class="modal-role-info">
                        <h2>${dataItem.role}</h2>
                        <p>Current Incumbent: <strong>${dataItem.incumbent}</strong></p>
                        <div class="modal-role-details">
                            ${dataItem.roleDetails}
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <div class="section-title">Succession Strategy Pipeline</div>
                    <div class="successors-list">
                        ${successorsHTML}
                    </div>
                </div>`;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close on background click
        modalOverlay.addEventListener('click', e => { 
            if (e.target === modalOverlay) closeModal(); 
        });
    </script>
</body>
</html>
