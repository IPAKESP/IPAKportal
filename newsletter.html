<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Portal - Newsletter Archives</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #203265;
            --lime: #A8C500;
            --white: #FFFFFF;
            --med-grey: #9C9C9C;
            --light-grey: #D4D4D4;
            --bg-color: #F5F7FA;
            --emergency-red: #ff4757;
            --border-light: #E5E7EB; /* Added for standard header */
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            cursor: none; 
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--navy);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- CUSTOM CURSOR (Z-INDEX FIXED) --- */
        .cursor-dot {
            width: 8px; height: 8px; background-color: var(--lime);
            position: fixed; z-index: 999999; pointer-events: none;
            border-radius: 50%; box-shadow: 0 0 10px var(--lime);
        }

        .cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--navy);
            position: fixed; z-index: 999998; pointer-events: none;
            border-radius: 50%; transition: width 0.2s, height 0.2s, border-color 0.2s;
        }

        body.hovering .cursor-outline {
            width: 60px; height: 60px; border-color: var(--lime);
            background-color: rgba(168, 197, 0, 0.1);
        }

        /* --- STANDARD HEADER STYLES --- */
        .top-bar {
            background: rgba(255, 255, 255, 0.98);
            border-bottom: 1px solid var(--border-light);
            height: 64px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
        }

        .logo-link img { width: 100px; height: auto; transition: opacity 0.3s ease; }
        .logo-link:hover img { opacity: 0.8; }

        .header-actions { display: flex; align-items: center; gap: 16px; }
        
        .user-icon { font-size: 22px; color: var(--navy); transition: color 0.3s ease; cursor: pointer; }
        .user-icon:hover { color: var(--lime); }

        .logout-btn {
            padding: 6px 16px; background: transparent;
            border: 1px solid var(--border-light); color: var(--navy);
            border-radius: 6px; font-weight: 500; font-size: 13px;
            transition: all 0.3s ease; cursor: pointer;
        }
        .logout-btn:hover { border-color: var(--navy); background: #f3f4f6; }

        /* --- LAYOUT & HEADER --- */
        .wrapper { padding-top: 120px; padding-bottom: 50px; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .page-header { text-align: center; margin-bottom: 60px; animation: float 6s ease-in-out infinite; }
        .page-header h1 { font-size: 2.5rem; color: var(--navy); }
        .page-header p { color: var(--lime); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; font-weight: 700; }

        /* --- NEWSLETTER GRID --- */
        .newsletter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            min-height: 250px;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--lime);
            box-shadow: 0 15px 30px rgba(32, 50, 101, 0.1);
        }

        .year-tag {
            background: var(--navy); color: var(--lime);
            padding: 6px 15px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 700; width: fit-content;
        }

        .card-title { font-size: 1.5rem; color: var(--navy); font-weight: 700; }
        .card-desc { color: var(--med-grey); font-size: 0.95rem; line-height: 1.6; }

        .btn-view {
            display: flex; align-items: center; gap: 10px;
            color: var(--navy); font-weight: 700; font-size: 0.9rem;
            margin-top: auto; /* Pushes button to bottom */
        }
        .btn-view i { color: var(--lime); transition: 0.3s; }
        .card:hover .btn-view i { transform: translateX(5px); }

        .bg-icon {
            position: absolute; right: -20px; bottom: -20px;
            font-size: 10rem; color: rgba(32, 50, 101, 0.03);
            transform: rotate(-15deg); transition: 0.3s;
        }
        .card:hover .bg-icon { transform: rotate(0deg) scale(1.1); }

        footer {
            text-align: center; margin-top: 80px; padding: 40px 0;
            color: var(--med-grey); font-size: 0.8rem; letter-spacing: 2px;
        }

        /* --- IFRAME MODAL STYLES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(32, 50, 101, 0.85); z-index: 100000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); animation: fadeInModal 0.3s ease;
        }
        .modal-container {
            background: var(--bg-color); width: 90%; max-width: 1200px; height: 90vh; border-radius: 15px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.95); animation: scaleInModal 0.3s ease forwards;
        }
        .modal-header {
            background: var(--white); padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 2px solid var(--lime);
        }
        .modal-header h3 { color: var(--navy); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: var(--emergency-red); transition: 0.3s; }
        .close-btn:hover { transform: scale(1.2) rotate(90deg); color: #ff0000; }
        .modal-body { flex-grow: 1; width: 100%; height: 100%; }
        #appViewer { width: 100%; height: 100%; border: none; background: var(--light-grey); }

        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleInModal { from { transform: scale(0.95); } to { transform: scale(1); } }

        @media (max-width: 768px) {
            .cursor-dot, .cursor-outline { display: none; }
            * { cursor: auto; }
            .top-bar { padding: 0 20px; }
            .modal-container { width: 95%; height: 95vh; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" data-cursor-dot></div>
    <div class="cursor-outline" data-cursor-outline></div>

    <nav class="top-bar">
        <a href="dashboard.html" class="logo-link">
            <img src="logo.png" alt="IPAK Logo">
        </a>
        <div class="header-actions">
            <a href="dashboard.html" style="text-decoration: none;">
                <i class="fas fa-arrow-left user-icon" title="Back to Dashboard"></i>
            </a>
            
            <i class="fas fa-user-circle user-icon" title="My Profile"></i>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="container">
            
            <div class="page-header">
                <p>IPAK Archives</p>
                <h1>Company Newsletters</h1>
            </div>

            <div class="newsletter-grid">
                
                <a href="javascript:void(0);" onclick="openIframeModal('https://heyzine.com/flip-book/bc2d19a6a9.html', 'Edition 2025')" class="card">
                    <i class="fas fa-paper-plane bg-icon"></i>
                    <div class="year-tag">NEW 2025</div>
                    <div class="card-title">Edition 2025</div>
                    <p class="card-desc">Stay updated with the latest company news, upcoming events, and achievements of the current year.</p>
                    <div class="btn-view">View Newsletter <i class="fas fa-arrow-right"></i></div>
                </a>

            </div>

            <footer>&copy;IPAK PORTAL 2026 | DESIGNED BY HR</footer>
        </div>
    </div>

    <div id="iframeModal" class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="iframeModalTitle">Loading...</h3>
                <button class="close-btn" onclick="closeIframeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <iframe id="appViewer" src="" allowfullscreen="true"></iframe>
            </div>
        </div>
    </div>

    <script>
        // Smooth Cursor
        const cursorDot = document.querySelector('[data-cursor-dot]');
        const cursorOutline = document.querySelector('[data-cursor-outline]');
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            cursorOutline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 400, fill: "forwards" });
        });

        document.querySelectorAll('a, button, i, .card').forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });

        // --- MODAL LOGIC ADDED HERE ---
        function openIframeModal(url, title) {
            document.getElementById('iframeModalTitle').innerText = title;
            document.getElementById('appViewer').src = url;
            document.getElementById('iframeModal').style.display = 'flex';
        }

        function closeIframeModal() {
            document.getElementById('iframeModal').style.display = 'none';
            document.getElementById('appViewer').src = ''; // Clear source to stop background processes
        }
        
        // Added logout function for the standard header
        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>
