<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPAK Succession Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        /* Premium Dark UI - Google/Vercel Aesthetic */
        :root {
            --bg-main: #0a0a0c;
            --bg-card: #141418;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-color: #27272a;
            --gemini-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570, #fbbc04);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        /* Centered Header Layout */
        .header { text-align: center; padding: 50px 20px 30px; }
        .header h1 { font-size: 38px; font-weight: 700; background: var(--gemini-gradient); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .header p { color: var(--text-dim); font-size: 16px; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* Loading & Error States */
        #loader { text-align: center; color: var(--text-dim); padding: 50px; font-size: 18px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); }
        .error-text { color: #d96570 !important; font-weight: 500; }

        /* Clean Grid View */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }

        .card-wrapper {
            position: relative; border-radius: 16px; padding: 2px; background: var(--border-color); cursor: pointer; transition: all 0.3s ease;
        }
        .card-wrapper:hover {
            background: var(--gemini-gradient); background-size: 300% 300%; animation: gradientBorder 3s ease infinite; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(155, 114, 203, 0.2);
        }

        @keyframes gradientBorder { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .card-content { background-color: var(--bg-card); border-radius: 14px; height: 100%; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .card-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 2px solid var(--border-color); background-color: #27272a; }
        .card-wrapper:hover .card-avatar { border-color: #9b72cb; }
        .role-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; color: var(--text-main); }
        .incumbent-name { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; }
        .view-btn { margin-top: auto; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #9b72cb; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        /* Modal (Popup) Styling */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-container { background-color: var(--bg-main); border: 1px solid var(--border-color); border-radius: 20px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; position: relative; transform: scale(0.9); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-container { transform: scale(1); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 10; }
        .modal-header { padding: 40px 40px 30px; border-bottom: 1px solid var(--border-color); background: linear-gradient(to bottom, rgba(155, 114, 203, 0.05), transparent); display: flex; gap: 25px; align-items: center; }
        .modal-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #9b72cb; }
        .modal-body { padding: 30px 40px 40px; }
        .successors-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .successor-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; gap: 15px; }
        .succ-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--border-color); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>IPAK Succession Dashboard</h1>
        <p>Live Corporate Pipeline (Synced with Google Sheets)</p>
    </div>

    <div class="container">
        <div id="loader">Fetching live data from Google Sheets...<br><span style="font-size:14px; opacity:0.7;">Please wait a moment.</span></div>
        <div class="cards-grid" id="grid-container" style="display: none;"></div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-container">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modal-content-area"></div>
        </div>
    </div>

    <script>
        // CRITICAL FIX: The URL MUST end in /pub?gid=2081750403&single=true&output=csv 
        // We replaced /pubhtml with /pub?output=csv so JavaScript can read it as pure data.
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2eGdEbyAtUT2PkOaZ59jX6g7mvXHAOtgOvOO7BxUWfo70e56-0RwMKZJbXzEMTIQpC6cHK6g65Qw8/pub?gid=2081750403&single=true&output=csv";
        
        let globalData = [];

        // Fetch Data using PapaParse with header: false (Since you cleared headers)
        Papa.parse(sheetCsvUrl, {
            download: true,
            header: false, // Set to false so it reads by column index (0, 1, 2...)
            skipEmptyLines: true,
            complete: function(results) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('grid-container').style.display = 'grid';
                
                // MAPPING BY COLUMNS (A=0, B=1, C=2, etc.)
                // Aap is numbering ko apni sheet k hisaab say adjust kar saktay hain
                globalData = results.data.map((row, index) => {
                    return {
                        id: index,
                        role: row[0] || "Unknown Position", // Column A (Position)
                        incumbent: row[1] || "N/A",         // Column B (Current Head)
                        roleDetails: row[2] || "No details available.", // Column C (Details)
                        
                        // Successor 1 details
                        successors: [
                            {
                                name: row[3] || "N/A",      // Column D (Successor Name)
                                details: row[4] || "N/A",   // Column E (Successor Details)
                                badge: row[5] || "Ready"    // Column F (Readiness status)
                            }
                        ]
                    };
                }).filter(item => item.role !== "Unknown Position" && item.role.trim() !== ""); 

                if(globalData.length === 0) {
                    document.getElementById('loader').style.display = 'block';
                    document.getElementById('loader').innerHTML = "<span class='error-text'>Data received, but columns are empty. Please check your sheet structure.</span>";
                } else {
                    renderGrid(globalData);
                }
            },
            error: function(err) {
                document.getElementById('loader').innerHTML = `
                    <span class="error-text">Failed to fetch data!</span><br>
                    <small>Make sure your sheet is published to the web as <b>CSV</b>.</small><br>
                    <small style="color:#666;">Error Details: ${err.message}</small>
                `;
                console.error("PapaParse Error:", err);
            }
        });

        // UI Rendering Logic
        const gridContainer = document.getElementById('grid-container');
        const modalOverlay = document.getElementById('detailModal');
        const modalContentArea = document.getElementById('modal-content-area');

        function renderGrid(data) {
            gridContainer.innerHTML = '';
            data.forEach((item) => {
                const defaultAvatar = `https://ui-avatars.com/api/?name=${item.incumbent}&background=27272a&color=fff&size=150`;
                const card = document.createElement('div');
                card.className = 'card-wrapper';
                card.onclick = () => openModal(item.id);

                card.innerHTML = `
                    <div class="card-content">
                        <img src="" alt="" class="card-avatar" onerror="this.src='${defaultAvatar}'">
                        <h3 class="role-title">${item.role}</h3>
                        <p class="incumbent-name">${item.incumbent}</p>
                        <div class="view-btn">View Complete Profile <span>→</span></div>
                    </div>
                `;
                gridContainer.appendChild(card);
            });
        }

        function openModal(id) {
            const dataItem = globalData.find(item => item.id === id);
            if(!dataItem) return;

            const incFallback = `https://ui-avatars.com/api/?name=${dataItem.incumbent}&background=27272a&color=fff&size=200`;
            let successorsHTML = '';
            
            dataItem.successors.forEach(succ => {
                if(succ.name && succ.name !== "N/A" && succ.name.trim() !== "") {
                    const succFallback = `https://ui-avatars.com/api/?name=${succ.name}&background=1c1c22&color=fff&size=150`;
                    successorsHTML += `
                        <div class="successor-item">
                            <img src="" class="succ-avatar" onerror="this.src='${succFallback}'">
                            <div>
                                <h4>${succ.name}</h4>
                                <p style="color: var(--text-dim); font-size: 13px; margin: 5px 0;">${succ.details}</p>
                                <span style="font-size: 11px; padding: 4px 10px; border-radius: 20px; background: rgba(66,133,244,0.1); color: #8ab4f8;">${succ.badge}</span>
                            </div>
                        </div>`;
                }
            });

            modalContentArea.innerHTML = `
                <div class="modal-header">
                    <img src="" class="modal-avatar" onerror="this.src='${incFallback}'">
                    <div>
                        <h2>${dataItem.role}</h2>
                        <p style="color: var(--text-dim); margin-bottom: 10px;">Current Head: <strong>${dataItem.incumbent}</strong></p>
                        <div style="background: var(--bg-card); padding: 15px; border-radius: 8px; border-left: 3px solid #4285f4; font-size: 14px; color: #d1d5db;">
                            ${dataItem.roleDetails}
                        </div>
                    </div>
                </div>
                <div class="modal-body">
                    <h4 style="color: #9b72cb; text-transform: uppercase; font-size: 14px; margin-bottom: 20px;">Successors Info</h4>
                    <div class="successors-list">${successorsHTML || '<p style="color:var(--text-dim);">No successors updated yet.</p>'}</div>
                </div>`;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    </script>
</body>
</html>
